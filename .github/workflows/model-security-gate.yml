name: Prisma AIRS Model Security Gate
run-name: "${{ github.event.inputs.custom_hf_url && format('HF Webhook: {0}', github.event.inputs.custom_hf_url) || github.event.inputs.model || 'Prisma AIRS Model Security Gate' }}"

on:
  push:
    branches: [main, develop]
    paths:
      - "models/**.yaml"
      - "models/**.yml"
  pull_request:
    branches: [main]
    paths:
      - "models/**.yaml"
      - "models/**.yml"
  schedule:
    - cron: "0 8 */2 * *"   # every 2 days at 8am UTC — clean model only, no failure emails
  repository_dispatch:
    types: [huggingface-model-updated]
  workflow_dispatch:
    inputs:
      model:
        description: "Model config to scan"
        required: false
        type: choice
        options:
          - models/experimental-llm.yaml
          - models/customer-support-llm.yaml
      custom_hf_url:
        description: "Or paste any HuggingFace URL (overrides model selection above)"
        required: false
        type: string

# Required GitHub Secrets:
#   MODEL_SECURITY_CLIENT_ID     — AIRS service account client ID
#   MODEL_SECURITY_CLIENT_SECRET — AIRS service account client secret
#   TSG_ID                       — Tenant service group ID (1444407992)
#   MODEL_SECURITY_GROUP_UUID    — AIRS security group UUID
#   HF_TOKEN                     — HuggingFace token (Phase 2 registry push)

jobs:
  airs-security-scan:
    name: Scan with Prisma AIRS
    runs-on: ubuntu-latest

    outputs:
      changed_models: ${{ steps.detect.outputs.files }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Authenticate with AIRS private PyPI
        id: pypi-auth
        run: |
          PYPI_URL=$(bash backend/get_pypi_url.sh)
          echo "::add-mask::$PYPI_URL"
          echo "pypi_url=$PYPI_URL" >> "$GITHUB_OUTPUT"
        env:
          MODEL_SECURITY_CLIENT_ID: ${{ secrets.MODEL_SECURITY_CLIENT_ID }}
          MODEL_SECURITY_CLIENT_SECRET: ${{ secrets.MODEL_SECURITY_CLIENT_SECRET }}
          TSG_ID: ${{ secrets.TSG_ID }}
          MODEL_SECURITY_API_ENDPOINT: https://api.sase.paloaltonetworks.com/aims

      - name: Install dependencies
        run: |
          pip install pyyaml python-dotenv
          pip install model-security-client \
            --extra-index-url "${{ steps.pypi-auth.outputs.pypi_url }}"

      - name: Detect model configs to scan
        id: detect
        run: |
          CUSTOM_URL="${{ github.event.inputs.custom_hf_url }}"

          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            MODE="uri"
            TARGET="${{ github.event.client_payload.hf_url }}"
            echo "HuggingFace webhook: $TARGET"
          elif [ "${{ github.event_name }}" = "schedule" ]; then
            MODE="file"
            TARGET="models/customer-support-llm.yaml"
            echo "Scheduled rescan: $TARGET"
          elif [ -n "$CUSTOM_URL" ]; then
            MODE="uri"
            TARGET="$CUSTOM_URL"
            echo "Scanning custom URL: $TARGET"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            MODE="file"
            TARGET="${{ github.event.inputs.model }}"
            echo "Scanning: $TARGET"
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            MODE="file"
            TARGET=$(git diff --name-only "$BASE_SHA" HEAD -- 'models/*.yaml' 'models/*.yml' | tr '\n' ' ' | xargs)
            echo "Scanning: $TARGET"
          else
            BASE_SHA="$(git rev-parse HEAD~1 2>/dev/null || git rev-list --max-parents=0 HEAD)"
            MODE="file"
            TARGET=$(git diff --name-only "$BASE_SHA" HEAD -- 'models/*.yaml' 'models/*.yml' | tr '\n' ' ' | xargs)
            echo "Scanning: $TARGET"
          fi

          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          echo "target=$TARGET" >> "$GITHUB_OUTPUT"

          # also expose files for the registry job (only the local yaml files we scanned)
          if [ "$MODE" = "file" ]; then
            echo "files=$TARGET" >> "$GITHUB_OUTPUT"
          else
            echo "files=" >> "$GITHUB_OUTPUT"
          fi

      - name: Run AIRS model security scan
        run: |
          TARGET="${{ steps.detect.outputs.target }}"
          if [ -z "$TARGET" ]; then
            echo "No model to scan — skipping."
            exit 0
          fi

          if [ "${{ steps.detect.outputs.mode }}" = "uri" ]; then
            python backend/ci_scan_model.py --uri "$TARGET"
          else
            python backend/ci_scan_model.py $TARGET
          fi
        env:
          MODEL_SECURITY_CLIENT_ID: ${{ secrets.MODEL_SECURITY_CLIENT_ID }}
          MODEL_SECURITY_CLIENT_SECRET: ${{ secrets.MODEL_SECURITY_CLIENT_SECRET }}
          MODEL_SECURITY_TSG_ID: ${{ secrets.TSG_ID }}
          MODEL_SECURITY_GROUP_UUID: ${{ secrets.MODEL_SECURITY_GROUP_UUID }}
          MODEL_SECURITY_HF_GROUP_UUID: ${{ secrets.MODEL_SECURITY_HF_GROUP_UUID }}
          MODEL_SECURITY_API_ENDPOINT: https://api.sase.paloaltonetworks.com/aims

  register-to-registry:
    name: Register Approved Model to HuggingFace
    needs: airs-security-scan
    if: success() && (github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch') && needs.airs-security-scan.outputs.changed_models != ''
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install huggingface_hub pyyaml Jinja2

      - name: Push approved models to HuggingFace registry
        run: python backend/push_to_registry.py ${{ needs.airs-security-scan.outputs.changed_models }}
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
